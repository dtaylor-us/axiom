server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All API calls route through axiom-api gateway
    # axiom-api handles JWT validation and routes to
    # the correct pillar service internally
    location /api/ {
        proxy_pass http://axiom-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Critical for SSE: disable buffering so chunks stream through
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        # SSE-specific headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Compatibility path used by local non-gateway UI mode. Rewrite to the
    # gateway Lens route so external traffic still enters via axiom-api.
    location /lens-api/ {
        rewrite ^/lens-api/api/v1/lens/?(.*)$ /api/v1/lens/$1 break;
        proxy_pass http://axiom-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # SPA fallback: serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
