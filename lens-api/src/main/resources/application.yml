server:
  port: ${LENS_API_PORT:8083}
  shutdown: graceful

spring:
  application:
    name: lens-api
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/lens}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:localdev}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

lens:
  agent:
    base-url: ${LENS_AGENT_BASE_URL:http://lens-agent:8086}
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:300}
  gap:
    max-rounds: ${LENS_GAP_MAX_ROUNDS:5}
    max-questions-per-round: ${LENS_GAP_MAX_QUESTIONS:8}

axiom:
  gateway:
    bypass: ${AXIOM_GATEWAY_BYPASS:false}
    internal-secret: ${AXIOM_INTERNAL_SECRET:}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
