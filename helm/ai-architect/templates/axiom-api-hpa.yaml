{{- if .Values.axiomApi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: axiom-api
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: axiom-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: axiom-api
  minReplicas: {{ .Values.axiomApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.axiomApi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.axiomApi.hpa.targetCPU }}
{{- end }}
