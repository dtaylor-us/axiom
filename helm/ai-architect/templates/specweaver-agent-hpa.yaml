{{- if .Values.specweaverAgent.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: specweaver-agent
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: specweaver-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: specweaver-agent
  minReplicas: {{ .Values.specweaverAgent.hpa.minReplicas }}
  maxReplicas: {{ .Values.specweaverAgent.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.specweaverAgent.hpa.targetCPU }}
{{- end }}
