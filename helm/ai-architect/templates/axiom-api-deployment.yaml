apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-api
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: axiom-api
spec:
  replicas: {{ .Values.axiomApi.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: axiom-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: axiom-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: axiom-api
          image: {{ include "ai-architect.image" (dict "global" .Values.global "image" .Values.axiomApi.image) }}
          imagePullPolicy: {{ .Values.axiomApi.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AXIOM_API_PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: ARCHON_API_BASE_URL
              value: "http://archon-api:8081"
            - name: SPECWEAVER_API_BASE_URL
              value: "http://specweaver-api:8082"
            - name: AXIOM_GATEWAY_BYPASS
              value: "false"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: jwt-secret
            - name: AXIOM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: internal-secret
            - name: POSTGRES_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:5432/axiom_platform?sslmode=require"
          resources:
            {{- toYaml .Values.axiomApi.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-secrets
      {{- end }}
