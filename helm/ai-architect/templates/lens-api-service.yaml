apiVersion: v1
kind: Service
metadata:
  name: lens-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: lens-api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.lensApi.service.port }}
      targetPort: {{ .Values.lensApi.service.port }}
      protocol: TCP
      name: http
  selector:
    app: lens-api
