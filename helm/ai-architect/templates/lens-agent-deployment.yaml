apiVersion: apps/v1
kind: Deployment
metadata:
  name: lens-agent
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: lens-agent
spec:
  replicas: {{ .Values.lensAgent.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: lens-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: lens-agent
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: lens-agent
          image: {{ include "ai-architect.image" (dict "global" .Values.global "image" .Values.lensAgent.image) }}
          imagePullPolicy: {{ .Values.lensAgent.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.lensAgent.service.port }}
              protocol: TCP
          env:
            - name: LENS_AGENT_PORT
              value: "8086"
            - name: LLM_PROVIDER
              value: "openai"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: openai-api-key
            - name: OPENAI_MODEL
              value: "gpt-4o"
            - name: QDRANT_URL
              value: "http://{{ .Release.Name }}-qdrant:6333"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: ""
          resources:
            {{- toYaml .Values.lensAgent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.lensAgent.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.lensAgent.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-secrets
      {{- end }}
