apiVersion: v1
kind: Service
metadata:
  name: axiom-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: axiom-api
    chart: {{ .Chart.Name }}
    release: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: axiom-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
