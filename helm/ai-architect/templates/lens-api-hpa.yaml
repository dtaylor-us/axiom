{{- if .Values.lensApi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lens-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lens-api
  minReplicas: {{ .Values.lensApi.hpa.minReplicas }}
  maxReplicas: {{ .Values.lensApi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.lensApi.hpa.targetCPU }}
{{- end }}
