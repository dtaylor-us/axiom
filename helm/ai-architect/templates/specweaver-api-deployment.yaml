apiVersion: apps/v1
kind: Deployment
metadata:
  name: specweaver-api
  labels:
    {{- include "ai-architect.labels" . | nindent 4 }}
    app.kubernetes.io/component: specweaver-api
spec:
  replicas: {{ .Values.specweaverApi.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: specweaver-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: specweaver-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: specweaver-api
          image: {{ include "ai-architect.image" (dict "global" .Values.global "image" .Values.specweaverApi.image) }}
          imagePullPolicy: {{ .Values.specweaverApi.image.pullPolicy }}
          ports:
            - containerPort: 8082
              protocol: TCP
          env:
            - name: SPECWEAVER_API_PORT
              value: "8082"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: AXIOM_GATEWAY_BYPASS
              value: "false"
            - name: POSTGRES_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:5432/specweaver?sslmode=require"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: specweaver-jwt-secret
            - name: AXIOM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: internal-secret
            - name: STORAGE_TYPE
              value: "azure-blob"
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: archon-secrets
                  key: storage-connection-string
                  optional: true
            - name: AZURE_BLOB_CONTAINER
              value: "specweaver-documents"
            - name: SPECWEAVER_AGENT_BASE_URL
              value: "http://specweaver-agent:8085"
            - name: ARCHON_API_BASE_URL
              value: "http://archon-api:8081"
          resources:
            {{- toYaml .Values.specweaverApi.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-secrets
      {{- end }}
