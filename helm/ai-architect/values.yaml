# ── Global ────────────────────────────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []

bootstrapSecrets:
  create: false
  openaiApiKey: ""
  dbPassword: ""
  jwtSecret: ""
  agentInternalSecret: ""

# ── Agent (archon-agent) ─────────────────────────────────────────
agent:
  replicaCount: 2
  image:
    repository: archon/archon-agent
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8001
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
  nodeSelector:
    workload: agent
  tolerations:
    - key: workload
      operator: Equal
      value: agent
      effect: NoSchedule
  env:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"
    OTEL_SERVICE_NAME: "archon-agent"
    OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
    OTEL_TRACES_SAMPLER_ARG: "0.0"
    LLM_PROVIDER: "openai"
    QDRANT_URL: "http://ai-architect-qdrant:6333"
  secretEnv:
    - name: OPENAI_API_KEY
      secretName: archon-secrets
      secretKey: openai-api-key
    - name: INTERNAL_SECRET
      secretName: archon-secrets
      secretKey: agent-internal-secret

# ── API (archon-api) ───────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: archon/archon-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
  env:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"
    OTEL_SERVICE_NAME: "archon-api"
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
    AGENT_BASE_URL: "http://ai-architect-agent:8001"
  secretEnv:
    - name: DB_PASSWORD
      secretName: archon-secrets
      secretKey: db-password
    - name: JWT_SECRET
      secretName: archon-secrets
      secretKey: jwt-secret
    - name: AGENT_INTERNAL_SECRET
      secretName: archon-secrets
      secretKey: agent-internal-secret

# ── UI (axiom-ui) ──────────────────────────────────────────────
ui:
  replicaCount: 2
  image:
    repository: archon/axiom-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Axiom Platform Gateway ─────────────────────────────────────
axiomApi:
  replicaCount: 2
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPU: 70

# ── SpecWeaver API ─────────────────────────────────────────────
specweaverApi:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8082
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

# ── SpecWeaver Agent ───────────────────────────────────────────
specweaverAgent:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8085
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

# ── Lens API ─────────────────────────────────────────────────────
lensApi:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8083
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

# ── Lens Agent ───────────────────────────────────────────────────
lensAgent:
  replicaCount: 1
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8086
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

# ── External database host (prod) ──────────────────────────────
database:
  host: ai-architect-postgres

# ── PostgreSQL ──────────────────────────────────────────────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
  storage:
    size: 20Gi
    storageClassName: managed-premium
  env:
    POSTGRES_DB: archon
    POSTGRES_USER: archon
  secretEnv:
    - name: POSTGRES_PASSWORD
      secretName: archon-secrets
      secretKey: db-password
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ── Qdrant ──────────────────────────────────────────────────────
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: latest
  storage:
    size: 10Gi
    storageClassName: managed-premium
  service:
    httpPort: 6333
    grpcPort: 6334
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# ── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true
    issuer: letsencrypt-prod
    secretName: ai-architect-tls
  host: ""

# ── Network Policy ──────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── Azure Key Vault CSI ─────────────────────────────────────────
keyVault:
  enabled: true
  vaultName: ""
  tenantId: ""
  userAssignedIdentityClientId: ""
  secrets:
    - name: openai-api-key
      key: openai-api-key
    - name: db-password
      key: db-password
    - name: jwt-secret
      key: jwt-secret
    - name: internal-secret
      key: agent-internal-secret
    - name: specweaver-jwt-secret
      key: specweaver-jwt-secret
    - name: lens-jwt-secret
      key: lens-jwt-secret
