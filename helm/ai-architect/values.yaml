# ── Global ────────────────────────────────────────────────────────
global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Bootstrap secrets (for initial environment bring-up only) ──────
# When keyVault.enabled=true this should stay false — secrets are synced
# by the CSI driver. Enable only when Key Vault CSI is not yet available,
# e.g. the very first deploy into a fresh cluster.
# Never commit real values here; pass them via --set at deploy time.
bootstrapSecrets:
  create: false
  openaiApiKey: ""
  dbPassword: ""
  jwtSecret: ""
  agentInternalSecret: ""

# ── Agent (Python / FastAPI) ─────────────────────────────────────
agent:
  replicaCount: 2
  image:
    repository: archon/ai-architect-agent
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8001
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
  # Schedule agent pods on the dedicated agent node pool.
  # The node taint workload=agent:NoSchedule is applied by Terraform.
  nodeSelector:
    workload: agent
  tolerations:
    - key: workload
      operator: Equal
      value: agent
      effect: NoSchedule
  env:
    # Tracing is disabled (sampler ratio 0.0) until a collector is deployed
    # in the cluster. Keeping the endpoint set prevents startup warnings;
    # zero-ratio sampling means no spans are exported and no connections made.
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"
    OTEL_SERVICE_NAME: "archon-agent"
    OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
    OTEL_TRACES_SAMPLER_ARG: "0.0"
    LLM_PROVIDER: "openai"
    QDRANT_URL: "http://ai-architect-qdrant:6333"
  # Secret references — actual values sourced from Key Vault CSI
  secretEnv:
    - name: OPENAI_API_KEY
      secretName: archon-secrets
      secretKey: openai-api-key
    - name: INTERNAL_SECRET
      secretName: archon-secrets
      secretKey: agent-internal-secret

# ── API (Spring Boot) ───────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: archon/ai-architect-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
  env:
    # Tracing is disabled (probability 0.0) until a collector is deployed
    # in the cluster. Zero probability means no spans are sampled and the
    # OTLP exporter never attempts to connect to the endpoint.
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"
    OTEL_SERVICE_NAME: "archon-api"
    MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.0"
    AGENT_BASE_URL: "http://ai-architect-agent:8001"
  secretEnv:
    - name: DB_PASSWORD
      secretName: archon-secrets
      secretKey: db-password
    - name: JWT_SECRET
      secretName: archon-secrets
      secretKey: jwt-secret
    - name: AGENT_INTERNAL_SECRET
      secretName: archon-secrets
      secretKey: agent-internal-secret

# ── UI (React / Nginx) ──────────────────────────────────────────
ui:
  replicaCount: 2
  image:
    repository: archon/ai-architect-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── PostgreSQL ──────────────────────────────────────────────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
  storage:
    size: 20Gi
    storageClassName: managed-premium
  env:
    POSTGRES_DB: archon
    POSTGRES_USER: archon
  secretEnv:
    - name: POSTGRES_PASSWORD
      secretName: archon-secrets
      secretKey: db-password
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ── Qdrant ──────────────────────────────────────────────────────
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: latest
  storage:
    size: 10Gi
    storageClassName: managed-premium
  service:
    httpPort: 6333
    grpcPort: 6334
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# ── Ingress ─────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # HTTP to HTTPS redirect — nginx handles this automatically when TLS is
    # configured on the ingress. Both annotations must be true together.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true
    # Production issuer. Let's Encrypt prod CA is trusted by all browsers.
    # Rate limit: 5 duplicate certificates per domain per week.
    issuer: letsencrypt-prod
    secretName: ai-architect-tls
  # Overridden at deploy time from the terraform output ingress_fqdn.
  # Set to a custom domain if one is configured; otherwise leave empty and the
  # Azure-assigned FQDN is used (set via --set ingress.host=... during helm deploy).
  host: ""

# ── Network Policy ──────────────────────────────────────────────
networkPolicy:
  enabled: true

# ── Azure Key Vault CSI ─────────────────────────────────────────
# Override individual keys at deploy time with --set, e.g.:
#   --set keyVault.vaultName=kv-aiarchitect-dev
keyVault:
  enabled: true
  vaultName: ""
  tenantId: ""
  userAssignedIdentityClientId: ""
  secrets:
    - name: openai-api-key
      key: openai-api-key
    - name: db-password
      key: db-password
    - name: jwt-secret
      key: jwt-secret
    - name: internal-secret
      key: agent-internal-secret
