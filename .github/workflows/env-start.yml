# ─────────────────────────────────────────────────────────────────────────────
# env-start.yml
#
# Starts the AKS cluster and PostgreSQL server, waits for both to be fully
# ready, then performs a rolling restart of all application pods so they
# establish fresh database connections.
# Runs on weekday mornings automatically. Can be triggered manually at any time.
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID         Service principal client ID (OIDC)
#   AZURE_TENANT_ID         Azure tenant ID (OIDC)
#   AZURE_SUBSCRIPTION_ID   Azure subscription ID (OIDC)
#   AZURE_RESOURCE_GROUP    Resource group name e.g. rg-axiom-dev
#   AKS_CLUSTER_NAME        AKS cluster name e.g. aks-axiom-dev
#   AZURE_DB_SERVER_NAME    *** NEW *** PostgreSQL flexible server name
#                           Find with:  cd terraform && terraform output -raw db_server_name
#                           Or: Azure Portal -> resource group -> PostgreSQL server name
#                           Example value: psql-axiom-dev-bpxn
#
# ─────────────────────────────────────────────────────────────────────────────

# ─── Schedule customisation ──────────────────────────────────────────────────
# Cron format: minute  hour  day-of-month  month  day-of-week
#              (0-59)  (0-23)    (1-31)   (1-12)   (0-6, Sun=0)
#
# All times are UTC. Adjust the hour values to match your local working hours:
#   GMT+0  UK standard:     no adjustment needed
#   GMT+1  UK summer (BST): subtract 1h  (e.g. 07 UTC = 08 BST start)
#   GMT+2  Central Europe:  subtract 2h  (e.g. 06 UTC = 08 CET start)
#   GMT-5  US Eastern:      add 5h       (e.g. 12 UTC = 07 EST start)
#   GMT-8  US Pacific:      add 8h       (e.g. 15 UTC = 07 PST start)
#   GMT+10 AEST:            subtract 10h (e.g. 21 UTC prev day = 07 AEST)
#
# workflow_dispatch lets you start the environment immediately regardless
# of the schedule — no need to wait for the next cron trigger.
# ─────────────────────────────────────────────────────────────────────────────

name: "Env — Start"

on:
  workflow_dispatch:
    inputs:
      skip_rollout:
        description: "Skip restarting application pods after start (useful when you only need the infrastructure)"
        type: boolean
        default: false

# Prevent a start and stop from running at the same time.
# cancel-in-progress: false ensures the in-flight job completes first.
concurrency:
  group: environment-lifecycle
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:

  # ─── check-state ────────────────────────────────────────────────────────────
  # Reads the current state of both resources before trying to start them.
  # The downstream start jobs use these outputs to skip work that is unnecessary
  # (e.g. do not start a resource that is already running).
  check-state:
    name: "Check current resource states"
    runs-on: ubuntu-latest
    outputs:
      aks_state: ${{ steps.aks_state.outputs.state }}
      db_state:  ${{ steps.db_state.outputs.state }}
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Get AKS cluster power state"
        id: aks_state
        run: |
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.ContainerService/managedClusters/${{ secrets.AKS_CLUSTER_NAME }}?api-version=2023-10-01" \
            --query properties.powerState.code \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "AKS current state: $STATE"

      - name: "Get PostgreSQL server state"
        id: db_state
        run: |
          STATE=$(az rest \
            --method GET \
            --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${{ secrets.AZURE_DB_SERVER_NAME }}?api-version=2023-06-01-preview" \
            --query properties.state \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "PostgreSQL current state: $STATE"

  # ─── start-database ─────────────────────────────────────────────────────────
  # Verifies the server is Ready. Sends a start signal only when it is not.
  # Runs in parallel with start-aks — the two resources are independent.
  # Waits up to 5 minutes (polling every 10 s) for the server to report Ready.
  start-database:
    name: "Ensure PostgreSQL server is Ready"
    runs-on: ubuntu-latest
    needs: check-state
    outputs:
      started: ${{ steps.start.outcome }}
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Start PostgreSQL flexible server"
        id: start
        if: needs.check-state.outputs.db_state != 'Ready'
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AZURE_DB_SERVER_NAME }}"
          echo "Starting PostgreSQL server ${NAME}..."
          set +e
          az rest \
            --method POST \
            --output none \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${NAME}/start?api-version=2023-06-01-preview"
          set -e

      - name: "PostgreSQL server already Ready"
        if: needs.check-state.outputs.db_state == 'Ready'
        run: |
          echo "PostgreSQL server already reported Ready; verifying readiness before continuing."

      - name: "Wait for PostgreSQL to become Ready"
        timeout-minutes: 5
        run: |
          echo "Waiting for PostgreSQL to become ready..."
          for i in $(seq 1 30); do
            STATE=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DBforPostgreSQL/flexibleServers/${{ secrets.AZURE_DB_SERVER_NAME }}?api-version=2023-06-01-preview" \
              --query properties.state \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/30 — PostgreSQL state: $STATE"
            if [ "$STATE" = "Ready" ]; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 10
          done
          echo "Error: PostgreSQL did not become ready within 5 minutes"
          exit 1

  # ─── start-aks ──────────────────────────────────────────────────────────────
  # Verifies the cluster is Running. Sends a start signal only when it is not.
  # Then verifies the API server is reachable and all Kubernetes nodes are Ready.
  start-aks:
    name: "Ensure AKS cluster is Ready"
    runs-on: ubuntu-latest
    needs: check-state
    outputs:
      started: ${{ steps.start.outcome }}
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Start AKS cluster"
        id: start
        if: needs.check-state.outputs.aks_state != 'Running'
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="${{ secrets.AZURE_RESOURCE_GROUP }}"
          NAME="${{ secrets.AKS_CLUSTER_NAME }}"
          echo "Starting AKS cluster ${NAME}..."
          set +e
          az rest \
            --method POST \
            --output none \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${NAME}/start?api-version=2023-10-01"
          set -e
          echo "AKS start signal sent"

      - name: "AKS cluster already Running"
        if: needs.check-state.outputs.aks_state == 'Running'
        run: |
          echo "AKS cluster already reported Running; verifying API server and node readiness before continuing."

      - name: "Wait for AKS cluster to reach Running state"
        timeout-minutes: 10
        run: |
          echo "Waiting for AKS cluster to reach Running state..."
          for i in $(seq 1 20); do
            STATE=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.ContainerService/managedClusters/${{ secrets.AKS_CLUSTER_NAME }}?api-version=2023-10-01" \
              --query properties.powerState.code \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/20 — AKS state: $STATE"
            if [ "$STATE" = "Running" ]; then
              echo "AKS cluster is running"
              exit 0
            fi
            sleep 30
          done
          echo "Error: AKS did not reach Running state within 10 minutes"
          exit 1

      - name: "Verify all Kubernetes nodes are Ready"
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          echo "Waiting for API server to become reachable..."
          API_REACHABLE=false
          for i in $(seq 1 20); do
            if kubectl get nodes --request-timeout=10s >/dev/null 2>&1; then
              echo "API server reachable after $i attempt(s)"
              API_REACHABLE=true
              break
            fi
            echo "  [$i/20] API server not yet reachable, retrying in 15s..."
            sleep 15
          done
          if [ "$API_REACHABLE" != "true" ]; then
            echo "Error: API server did not become reachable within 5 minutes"
            exit 1
          fi
          echo "Waiting for Kubernetes nodes to register..."
          NODE_COUNT=0
          for i in $(seq 1 40); do
            NODE_NAMES=$(kubectl get nodes \
              --request-timeout=10s \
              --output jsonpath='{.items[*].metadata.name}' \
              2>/dev/null || true)
            NODE_COUNT=$(echo "$NODE_NAMES" | wc -w | tr -d ' ')
            if [ "$NODE_COUNT" -gt 0 ]; then
              echo "$NODE_COUNT node(s) registered after $i attempt(s)"
              break
            fi
            echo "  [$i/40] No nodes registered yet, retrying in 15s..."
            sleep 15
          done
          if [ "$NODE_COUNT" -eq 0 ]; then
            echo "Error: no Kubernetes nodes registered within 10 minutes"
            kubectl get nodes || true
            exit 1
          fi
          echo "Waiting for all nodes to be Ready..."
          kubectl wait nodes \
            --all \
            --for=condition=Ready \
            --timeout=300s
          echo "All nodes are Ready"
          kubectl get nodes

  # ─── restart-application ────────────────────────────────────────────────────
  # Runs after both ensure jobs finish successfully.
  # Skipped entirely when skip_rollout input is true (infrastructure-only start).
  restart-application:
    name: "Restart application pods"
    runs-on: ubuntu-latest
    needs: [start-aks, start-database]
    if: |
      always() &&
      needs.start-aks.result == 'success' &&
      needs.start-database.result == 'success' &&
      inputs.skip_rollout != true
    steps:
      - name: "Authenticate to Azure"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Get AKS credentials"
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing
          echo "Waiting for API server to become reachable..."
          API_REACHABLE=false
          for i in $(seq 1 20); do
            if kubectl get nodes --request-timeout=10s >/dev/null 2>&1; then
              echo "API server reachable after $i attempt(s)"
              API_REACHABLE=true
              break
            fi
            echo "  [$i/20] API server not yet reachable, retrying in 15s..."
            sleep 15
          done
          if [ "$API_REACHABLE" != "true" ]; then
            echo "Error: API server did not become reachable within 5 minutes"
            exit 1
          fi

      - name: "Restart API deployment"
        run: |
          kubectl rollout restart deployment/ai-architect-api \
            --namespace ai-architect

      - name: "Restart agent deployment"
        run: |
          kubectl rollout restart deployment/ai-architect-agent \
            --namespace ai-architect

      - name: "Restart UI deployment"
        run: |
          kubectl rollout restart deployment/ai-architect-ui \
            --namespace ai-architect

      - name: "Restart axiom-api deployment"
        run: |
          kubectl rollout restart deployment/axiom-api \
            --namespace ai-architect

      - name: "Restart specweaver-api deployment"
        run: |
          kubectl rollout restart deployment/specweaver-api \
            --namespace ai-architect

      - name: "Restart specweaver-agent deployment"
        run: |
          kubectl rollout restart deployment/specweaver-agent \
            --namespace ai-architect

      - name: "Wait for all deployment rollouts to complete"
        timeout-minutes: 5
        run: |
          echo "Waiting for all deployments to be ready..."
          kubectl rollout status deployment/ai-architect-api \
            --namespace ai-architect \
            --timeout=300s
          kubectl rollout status deployment/ai-architect-agent \
            --namespace ai-architect \
            --timeout=300s
          kubectl rollout status deployment/ai-architect-ui \
            --namespace ai-architect \
            --timeout=300s
          kubectl rollout status deployment/axiom-api \
            --namespace ai-architect \
            --timeout=300s
          kubectl rollout status deployment/specweaver-api \
            --namespace ai-architect \
            --timeout=300s
          kubectl rollout status deployment/specweaver-agent \
            --namespace ai-architect \
            --timeout=300s
          echo "All deployments are ready"

      - name: "Print current pod status"
        run: |
          kubectl get pods --namespace ai-architect

      - name: "Print application URL"
        run: |
          echo "Waiting for ingress IP..."
          for i in $(seq 1 12); do
            IP=$(kubectl get ingress \
              --namespace ai-architect \
              --output jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' \
              2>/dev/null)
            if [ -n "$IP" ]; then
              echo "================================================"
              echo "Application is ready"
              echo "URL: http://$IP"
              echo "Or:  http://aiarchitect.$IP.nip.io"
              echo "================================================"
              exit 0
            fi
            echo "Attempt $i/12 — waiting for ingress IP..."
            sleep 10
          done
          echo "Could not determine ingress IP."
          echo "Check: kubectl get ingress -n ai-architect"

  # ─── summary ────────────────────────────────────────────────────────────────
  # Runs unconditionally (if: always()) so it reports status even when
  # individual jobs were skipped because resources were already running.
  summary:
    name: "Print startup summary"
    runs-on: ubuntu-latest
    needs: [start-aks, start-database, restart-application]
    if: always()
    steps:
      - name: "Print startup summary"
        run: |
          echo "================================================"
          echo "Dev environment startup complete"
          echo "================================================"
          echo ""
          echo "AKS cluster:   ${{ needs.start-aks.result }}"
          echo "PostgreSQL:    ${{ needs.start-database.result }}"
          echo "App rollout:   ${{ needs.restart-application.result }}"
          echo ""
          echo "If any step failed:"
          echo "  Check the failed job logs above"
          echo "  Run env-status workflow to see current state"
          echo "  Run env-restart-app to retry pod restarts only"
          echo "================================================"
