name: Copilot Agent — Implementation

# Triggered when an issue is assigned to @copilot
# or when a comment @mentions copilot on an issue.
# This workflow sets the agent up with the right context
# and Azure access before it starts working.

on:
  issues:
    types: [assigned]

permissions:
  id-token: write   # required for OIDC Azure login
  contents: read
  issues: write     # allows agent to comment on issues

jobs:
  copilot-setup:
    if: github.event.assignee.login == 'copilot'
    runs-on: ubuntu-latest
    environment: copilot
    steps:
      - uses: actions/checkout@v4

      - name: Confirm agent context files exist
        run: |
          echo "=== Verifying agent context files ==="
          for f in \
            ARCHITECTURE.md \
            ADL.md \
            .github/copilot-instructions.md; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f — agent will lack context"
            fi
          done

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Gather Azure platform state for agent context
        run: |
          echo "=== AKS pod status ==="
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing --only-show-errors
          kubectl get pods -n ai-architect \
            --no-headers \
            -o custom-columns="NAME:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready,RESTARTS:.status.containerStatuses[0].restartCount" \
            2>/dev/null || echo "kubectl not available in this runner"

          echo ""
          echo "=== Key Vault secrets (names only — no values) ==="
          az keyvault secret list \
            --vault-name ${{ secrets.KEY_VAULT_NAME }} \
            --query "[].name" -o tsv 2>/dev/null || echo "KV access unavailable"

          echo ""
          echo "=== PostgreSQL databases ==="
          az postgres flexible-server db list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server-name psql-axiom-dev-bpxn \
            --query "[].name" -o tsv 2>/dev/null || echo "DB access unavailable"

          echo ""
          echo "=== ACR repositories ==="
          az acr repository list \
            --name acraxiomdevbpxn \
            -o tsv 2>/dev/null || echo "ACR access unavailable"

      - name: Print platform topology for agent context
        run: |
          echo "=== Axiom Platform Services ==="
          echo "axiom-api        :8080  Spring Boot WebFlux  (gateway)"
          echo "archon-api       :8081  Spring Boot"
          echo "archon-agent     :8001  FastAPI + LangGraph"
          echo "specweaver-api   :8082  Spring Boot"
          echo "specweaver-agent :8085  FastAPI + LangGraph"
          echo "lens-api         :8083  Spring Boot"
          echo "lens-agent       :8086  FastAPI + LangGraph"
          echo ""
          echo "=== ADL hard rules ==="
          echo "  - Two services per pillar max (API + agent)"
          echo "  - No LLM calls in API services"
          echo "  - No PostgreSQL access in agent services"
          echo "  - No RestTemplate — WebClient only"
          echo "  - ddl-auto must be validate"
          echo "  - No hardcoded secrets"
          echo ""
          echo "=== Azure resources ==="
          echo "  AKS:        aks-axiom-dev         (rg-axiom-dev)"
          echo "  PostgreSQL: psql-axiom-dev-bpxn   (rg-axiom-dev)"
          echo "  Key Vault:  kv-axiom-dev-bpxn     (rg-axiom-dev)"
          echo "  ACR:        acraxiomdevbpxn        (rg-axiom-dev)"
          echo "  Ingress:    axiom-dev.eastus2.cloudapp.azure.com"
