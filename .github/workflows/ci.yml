name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-api:
    name: Test — Spring Boot API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aiarchitect_test
          POSTGRES_USER: aiarchitect
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: archon-api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/aiarchitect_test
          DB_USER: aiarchitect
          DB_PASSWORD: testpassword
          AGENT_BASE_URL: http://localhost:8001
          AGENT_INTERNAL_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-minimum-32-chars-here
          SPRING_PROFILES_ACTIVE: test
        run: mvn verify -Dfailsafe.skip=false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: archon-api/target/site/jacoco/

  test-agent:
    name: Test — Python Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: archon-agent
        run: pip install uv && uv pip install --system -e ".[dev]"

      - name: Unit tests
        working-directory: archon-agent
        env:
          INTERNAL_SECRET: test-secret
          LLM_PROVIDER: openai
          OPENAI_API_KEY: test-key-not-used-in-unit-tests
        run: pytest tests/unit/ -v

      - name: Integration tests
        working-directory: archon-agent
        env:
          INTERNAL_SECRET: test-secret
          LLM_PROVIDER: openai
          OPENAI_API_KEY: test-key-not-used-in-unit-tests
        run: pytest tests/integration/ -v

      - name: Coverage gate
        working-directory: archon-agent
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: archon-agent/coverage.xml

  test-ui:
    name: Test — React UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: axiom-ui/package-lock.json

      - name: Install dependencies
        working-directory: axiom-ui
        run: npm ci

      - name: Run tests with coverage
        working-directory: axiom-ui
        run: npx vitest run --coverage

  lint-terraform:
    name: Lint — Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

  build-check:
    name: Build — Docker images
    runs-on: ubuntu-latest
    needs: [test-api, test-agent, test-ui]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Build API image
        run: docker build archon-api -f archon-api/Dockerfile -t test/api:ci

      - name: Build agent image
        run: docker build archon-agent -f archon-agent/Dockerfile -t test/agent:ci

      - name: Build UI image
        run: docker build axiom-ui -f axiom-ui/Dockerfile -t test/ui:ci
