name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

# Only one deployment can run at a time.
# A newer push to main will cancel an in-progress deployment.
permissions:
  id-token: write   # required for OIDC login
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Validate ACR settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.ACR_LOGIN_SERVER }}" ]]; then
            echo "::error::Missing secret: ACR_LOGIN_SERVER (e.g. myregistry.azurecr.io)"
            exit 1
          fi
          if [[ "${{ secrets.ACR_LOGIN_SERVER }}" == http* ]]; then
            echo "::error::ACR_LOGIN_SERVER must not include http(s):// — value should be myregistry.azurecr.io"
            exit 1
          fi
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./ai-architect-api
          file: ./ai-architect-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/api:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/api:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/api:cache,mode=max

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./ai-architect-agent
          file: ./ai-architect-agent/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/agent:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/agent:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/agent:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/agent:cache,mode=max

      - name: Build and push UI
        uses: docker/build-push-action@v5
        with:
          context: ./ai-architect-ui
          file: ./ai-architect-ui/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ui:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/ui:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/ui:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/ui:cache,mode=max

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select subscription
        run: |
          az account show -o table
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az account show -o table

      - name: Get AKS credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${{ secrets.AKS_CLUSTER_NAME }}" ]]; then
            echo "::error::Missing secret: AKS_CLUSTER_NAME"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ]]; then
            echo "::error::Missing secret: AZURE_RESOURCE_GROUP"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          # Validate the cluster exists before fetching credentials — gives
          # a clearer error than get-credentials on a 400 Bad Request
          az aks show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            -o table

          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Verify kubectl context
        run: |
          kubectl config current-context
          kubectl cluster-info

      - name: Verify ACR is attached to AKS
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ACR integration for cluster ${{ secrets.AKS_CLUSTER_NAME }}..."
          az aks check-acr \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --acr "${{ secrets.ACR_NAME }}" || {
            echo "::warning::ACR not attached to AKS — pods may fail with ImagePullBackOff."
            echo "Fix: az aks update --attach-acr ${{ secrets.ACR_NAME }} \\"
            echo "  --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \\"
            echo "  --name ${{ secrets.AKS_CLUSTER_NAME }}"
          }

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Unstick Helm release if pending
        run: |
          set -euo pipefail
          ns=ai-architect
          rel=ai-architect

          status=$(helm -n "$ns" status "$rel" -o json 2>/dev/null | jq -r '.info.status' || true)
          echo "Helm release status: ${status:-<none>}"

          if [[ "$status" == "pending-install" || "$status" == "pending-upgrade" || "$status" == "pending-rollback" ]]; then
            echo "Release is stuck in '${status}'; attempting recovery..."
            rev=$(helm -n "$ns" history "$rel" -o json 2>/dev/null \
              | jq -r '[.[] | select(.status=="deployed")][-1].revision // empty' || true)
            if [[ -n "$rev" && "$rev" != "null" ]]; then
              echo "Rolling back to last deployed revision ${rev}..."
              helm -n "$ns" rollback "$rel" "$rev" --wait --timeout 20m
            else
              echo "No deployed revision found; uninstalling stuck release..."
              helm -n "$ns" uninstall "$rel" --wait || true
            fi
          else
            echo "Release is not in a pending state; no recovery needed."
          fi

      - name: Bootstrap cluster prerequisites
        run: |
          set -euo pipefail

          # ── Secrets Store CSI driver + Azure provider ──────────────────────────
          # The AKS key_vault_secrets_provider add-on manages both the core
          # CSI driver and the Azure provider DaemonSets. No Helm install needed.
          echo "=== Secrets Store CSI driver ==="
          kubectl get csidriver secrets-store.csi.k8s.io
          echo "CSI driver registered (AKS add-on)."

          kubectl get daemonset -n kube-system aks-secrets-store-provider-azure
          echo "Azure Key Vault provider DaemonSet present (AKS add-on)."

          # ── cert-manager ClusterIssuer ────────────────────────────────────
          echo "=== cert-manager ClusterIssuer ==="
          if kubectl get clusterissuer letsencrypt-prod &>/dev/null; then
            echo "ClusterIssuer letsencrypt-prod already exists."
          else
            echo "Creating ClusterIssuer letsencrypt-prod..."
            CERT_EMAIL="${{ secrets.CERT_MANAGER_EMAIL || 'admin@example.com' }}"
            kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: ${CERT_EMAIL}
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
                - http01:
                    ingress:
                      class: nginx
          EOF
            echo "ClusterIssuer created."
          fi

          # ── archon-secrets status (informational) ─────────────────────────
          echo "=== archon-secrets ==="
          kubectl -n ai-architect get secret archon-secrets &>/dev/null \
            && echo "Secret archon-secrets exists." \
            || echo "Secret archon-secrets not yet present — will be synced by CSI driver after first pod mount."

      - name: Get ingress FQDN
        id: ingress
        run: |
          # Use a custom hostname if one is configured in GitHub Secrets.
          # Otherwise, query the Azure-assigned FQDN from the static public IP
          # resource that Terraform created. This FQDN is stable and works for
          # Let's Encrypt HTTP-01 challenges without custom DNS configuration.
          if [ -n "${{ secrets.INGRESS_HOSTNAME }}" ]; then
            echo "host=${{ secrets.INGRESS_HOSTNAME }}" >> $GITHUB_OUTPUT
          else
            HOST=$(az network public-ip show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name "pip-${{ secrets.PROJECT_NAME }}-${{ secrets.ENVIRONMENT }}-ingress" \
              --query "dnsSettings.fqdn" \
              --output tsv 2>/dev/null || echo "")
            echo "host=${HOST}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Helm chart
        run: |
          helm upgrade --install ai-architect helm/ai-architect/ \
            --namespace ai-architect \
            --create-namespace \
            --wait \
            --timeout 10m \
            --atomic \
            --set api.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/api \
            --set api.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set agent.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/agent \
            --set agent.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set ui.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/ui \
            --set ui.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set keyVault.vaultName=${{ secrets.KEY_VAULT_NAME }} \
            --set keyVault.tenantId=${{ secrets.KEY_VAULT_TENANT_ID }} \
            --set keyVault.userAssignedIdentityClientId=${{ secrets.AKS_KUBELET_CLIENT_ID }} \
            --set ingress.host=${{ steps.ingress.outputs.host }} \
            --set ingress.tls.enabled=true \
            --set "ingress.tls.issuer=${{ secrets.TLS_ISSUER || 'letsencrypt-staging' }}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ai-architect-api \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/ai-architect-agent \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/ai-architect-ui \
            --namespace ai-architect --timeout=5m

      - name: Verify certificate issuance
        # continue-on-error so a slow certificate does not fail the deployment.
        # The deploy itself succeeded; the cert being pending is not a blocking
        # error — it resolves within minutes on a healthy cluster.
        continue-on-error: true
        run: |
          echo "Waiting for TLS certificate to be issued..."
          echo "This can take 1-2 minutes on first deploy."
          for i in $(seq 1 18); do
            READY=$(kubectl get certificate ai-architect-tls \
              --namespace ai-architect \
              --output jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
              2>/dev/null || echo "False")
            if [ "$READY" = "True" ]; then
              echo "Certificate is READY"
              echo "Application available at: https://${{ steps.ingress.outputs.host }}"
              exit 0
            fi
            echo "Attempt ${i}/18 — waiting 10s..."
            sleep 10
          done
          echo "Certificate not ready after 3 minutes."
          echo "Check status with:"
          echo "  kubectl describe certificate ai-architect-tls -n ai-architect"
          echo "Note: continue-on-error is set — deploy is not failed."
          echo "Run scripts/switch-to-prod-tls.sh once cert is ready."

      - name: Print status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ai-architect
          echo "=== Ingress ==="
          kubectl get ingress -n ai-architect

      - name: Debug failed pods
        if: failure()
        run: |
          set +e
          kubectl get pods -n ai-architect -o wide

          for pod in $(kubectl get pods -n ai-architect -o name); do
            echo "=== Describe $pod ==="
            kubectl describe $pod -n ai-architect | tail -200 || true

            echo "=== Logs for $pod (best effort) ==="
            kubectl logs $pod -n ai-architect --all-containers=true --tail=200 || true
          done

          echo "=== Namespace events ==="
          kubectl get events -n ai-architect --sort-by=.lastTimestamp | tail -200 || true

          echo "=== Namespace events ==="
          kubectl get events -n ai-architect --sort-by=.lastTimestamp | tail -200 || true
