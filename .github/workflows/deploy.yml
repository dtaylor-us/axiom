name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to latest main SHA)"
        required: false
        default: ""

# Only one deployment can run at a time.
# A newer push to main will cancel an in-progress deployment.
permissions:
  id-token: write   # required for OIDC login
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Validate ACR settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.ACR_LOGIN_SERVER }}" ]]; then
            echo "::error::Missing secret: ACR_LOGIN_SERVER (e.g. myregistry.azurecr.io)"
            exit 1
          fi
          if [[ "${{ secrets.ACR_LOGIN_SERVER }}" == http* ]]; then
            echo "::error::ACR_LOGIN_SERVER must not include http(s):// — value should be myregistry.azurecr.io"
            exit 1
          fi
          echo "ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./archon-api
          file: ./archon-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/api:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/api:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/api:cache,mode=max

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./archon-agent
          file: ./archon-agent/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/agent:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/agent:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/agent:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/agent:cache,mode=max

      - name: Build and push UI
        uses: docker/build-push-action@v5
        with:
          context: ./axiom-ui
          file: ./axiom-ui/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/ui:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/ui:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/ui:cache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/ui:cache,mode=max

  build-axiom-api:
    name: Build axiom-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip message when axiom-api Dockerfile is absent
        if: ${{ hashFiles('axiom-api/Dockerfile') == '' }}
        run: echo "Skipping axiom-api image build because axiom-api/Dockerfile is missing"

      - uses: azure/login@v2
        if: ${{ hashFiles('axiom-api/Dockerfile') != '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: ${{ hashFiles('axiom-api/Dockerfile') != '' }}
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push axiom-api
        if: ${{ hashFiles('axiom-api/Dockerfile') != '' }}
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image axiom-api:${{ github.sha }} \
            --image axiom-api:latest \
            --file axiom-api/Dockerfile \
            axiom-api/

  build-specweaver-api:
    name: Build specweaver-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip message when specweaver-api Dockerfile is absent
        if: ${{ hashFiles('specweaver-api/Dockerfile') == '' }}
        run: echo "Skipping specweaver-api image build because specweaver-api/Dockerfile is missing"

      - uses: azure/login@v2
        if: ${{ hashFiles('specweaver-api/Dockerfile') != '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: ${{ hashFiles('specweaver-api/Dockerfile') != '' }}
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push specweaver-api
        if: ${{ hashFiles('specweaver-api/Dockerfile') != '' }}
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image specweaver-api:${{ github.sha }} \
            --image specweaver-api:latest \
            --file specweaver-api/Dockerfile \
            specweaver-api/

  build-specweaver-agent:
    name: Build specweaver-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip message when specweaver-agent Dockerfile is absent
        if: ${{ hashFiles('specweaver-agent/Dockerfile') == '' }}
        run: echo "Skipping specweaver-agent image build because specweaver-agent/Dockerfile is missing"

      - uses: azure/login@v2
        if: ${{ hashFiles('specweaver-agent/Dockerfile') != '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: ${{ hashFiles('specweaver-agent/Dockerfile') != '' }}
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push specweaver-agent
        if: ${{ hashFiles('specweaver-agent/Dockerfile') != '' }}
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image specweaver-agent:${{ github.sha }} \
            --image specweaver-agent:latest \
            --file specweaver-agent/Dockerfile \
            specweaver-agent/

  build-lens-api:
    name: Build lens-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip message when lens-api Dockerfile is absent
        if: ${{ hashFiles('lens-api/Dockerfile') == '' }}
        run: echo "Skipping lens-api image build because lens-api/Dockerfile is missing"

      - uses: azure/login@v2
        if: ${{ hashFiles('lens-api/Dockerfile') != '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: ${{ hashFiles('lens-api/Dockerfile') != '' }}
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push lens-api
        if: ${{ hashFiles('lens-api/Dockerfile') != '' }}
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image lens-api:${{ github.sha }} \
            --image lens-api:latest \
            --file lens-api/Dockerfile \
            lens-api/

  build-lens-agent:
    name: Build lens-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip message when lens-agent Dockerfile is absent
        if: ${{ hashFiles('lens-agent/Dockerfile') == '' }}
        run: echo "Skipping lens-agent image build because lens-agent/Dockerfile is missing"

      - uses: azure/login@v2
        if: ${{ hashFiles('lens-agent/Dockerfile') != '' }}
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: ${{ hashFiles('lens-agent/Dockerfile') != '' }}
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push lens-agent
        if: ${{ hashFiles('lens-agent/Dockerfile') != '' }}
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image lens-agent:${{ github.sha }} \
            --image lens-agent:latest \
            --file lens-agent/Dockerfile \
            lens-agent/

  check-pillar-structure:
    name: Check pillar service count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify max two services per pillar
        run: |
          FAILED=0
          for pillar in archon specweaver lens; do
            COUNT=0
            [ -d "${pillar}-api" ] && COUNT=$((COUNT+1))
            [ -d "${pillar}-agent" ] && COUNT=$((COUNT+1))
            if [ "$COUNT" -gt 2 ]; then
              echo "VIOLATION: $pillar has $COUNT services (max 2)"
              FAILED=1
            else
              echo "OK: $pillar has $COUNT service(s)"
            fi
          done
          exit $FAILED

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - build-axiom-api
      - build-specweaver-api
      - build-specweaver-agent
      - build-lens-api
      - build-lens-agent
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select subscription
        run: |
          az account show -o table
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az account show -o table

      - name: Get AKS credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${{ secrets.AKS_CLUSTER_NAME }}" ]]; then
            echo "::error::Missing secret: AKS_CLUSTER_NAME"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ]]; then
            echo "::error::Missing secret: AZURE_RESOURCE_GROUP"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

          az aks show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            -o table

          az aks get-credentials \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Verify kubectl context
        run: |
          kubectl config current-context
          kubectl cluster-info

      - name: Verify ACR is attached to AKS
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ACR integration for cluster ${{ secrets.AKS_CLUSTER_NAME }}..."
          az aks check-acr \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --acr "${{ secrets.ACR_NAME }}" || {
            echo "::warning::ACR not attached to AKS — pods may fail with ImagePullBackOff."
            echo "Fix: az aks update --attach-acr ${{ secrets.ACR_NAME }} \\"
            echo "  --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \\"
            echo "  --name ${{ secrets.AKS_CLUSTER_NAME }}"
          }

      - uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Unstick Helm release if pending
        run: |
          set -euo pipefail
          ns=ai-architect
          rel=ai-architect

          status=$(helm -n "$ns" status "$rel" -o json 2>/dev/null | jq -r '.info.status' || true)
          echo "Helm release status: ${status:-<none>}"

          if [[ "$status" == "pending-install" || "$status" == "pending-upgrade" || "$status" == "pending-rollback" ]]; then
            echo "Release is stuck in '${status}'; attempting recovery..."
            rev=$(helm -n "$ns" history "$rel" -o json 2>/dev/null \
              | jq -r '[.[] | select(.status=="deployed")][-1].revision // empty' || true)
            if [[ -n "$rev" && "$rev" != "null" ]]; then
              echo "Rolling back to last deployed revision ${rev}..."
              helm -n "$ns" rollback "$rel" "$rev" --wait --timeout 20m
            else
              echo "No deployed revision found; uninstalling stuck release..."
              helm -n "$ns" uninstall "$rel" --wait || true
            fi
          else
            echo "Release is not in a pending state; no recovery needed."
          fi

      - name: Bootstrap cluster prerequisites
        run: |
          set -euo pipefail

          echo "=== Secrets Store CSI driver ==="
          kubectl get csidriver secrets-store.csi.k8s.io
          echo "CSI driver registered (AKS add-on)."

          kubectl get daemonset -n kube-system aks-secrets-store-provider-azure
          echo "Azure Key Vault provider DaemonSet present (AKS add-on)."

          echo "=== cert-manager ClusterIssuer ==="
          if kubectl get clusterissuer letsencrypt-prod &>/dev/null; then
            echo "ClusterIssuer letsencrypt-prod already exists."
          else
            echo "Creating ClusterIssuer letsencrypt-prod..."
            CERT_EMAIL="${{ secrets.CERT_MANAGER_EMAIL || 'admin@example.com' }}"
            kubectl apply -f - <<EOF
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: ${CERT_EMAIL}
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
                - http01:
                    ingress:
                      class: nginx
          EOF
            echo "ClusterIssuer created."
          fi

          echo "=== archon-secrets ==="
          kubectl -n ai-architect get secret archon-secrets &>/dev/null \
            && echo "Secret archon-secrets exists." \
            || echo "Secret archon-secrets not yet present — will be synced by CSI driver after first pod mount."

      - name: Verify lens prerequisites
        shell: bash
        run: |
          set -euo pipefail

          # Verify lens database exists — lens-api Flyway migrations will fail
          # on first startup if the database does not exist.
          DB_EXISTS=$(az postgres flexible-server db list \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --server-name psql-axiom-dev-bpxn \
            --query "[?name=='lens'].name" \
            --output tsv 2>/dev/null || echo "")
          if [[ -z "$DB_EXISTS" ]]; then
            echo "::error::lens database not found on psql-axiom-dev-bpxn."
            echo "Create it with:"
            echo "  az postgres flexible-server db create \\"
            echo "    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \\"
            echo "    --server-name psql-axiom-dev-bpxn \\"
            echo "    --database-name lens"
            echo "Or apply Terraform: azurerm_postgresql_flexible_server_database.lens"
            exit 1
          fi
          echo "lens database: OK"

          # Verify lens-jwt-secret exists and is not a placeholder.
          # Generate a real value automatically if missing.
          SECRET=$(az keyvault secret show \
            --vault-name "${{ secrets.KEY_VAULT_NAME }}" \
            --name lens-jwt-secret \
            --query value -o tsv 2>/dev/null || echo "")
          if [[ -z "$SECRET" || "$SECRET" == "placeholder-set-after-provisioning" ]]; then
            echo "lens-jwt-secret is missing or placeholder — generating now..."
            az keyvault secret set \
              --vault-name "${{ secrets.KEY_VAULT_NAME }}" \
              --name lens-jwt-secret \
              --value "$(openssl rand -base64 48)" \
              --output none
            echo "lens-jwt-secret: SET"
          else
            echo "lens-jwt-secret: OK"
          fi

      - name: Get ingress FQDN
        id: ingress
        run: |
          if [ -n "${{ secrets.INGRESS_HOSTNAME }}" ]; then
            echo "host=${{ secrets.INGRESS_HOSTNAME }}" >> $GITHUB_OUTPUT
          else
            HOST=$(az network public-ip show \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name "pip-${{ secrets.PROJECT_NAME }}-${{ secrets.ENVIRONMENT }}-ingress" \
              --query "dnsSettings.fqdn" \
              --output tsv 2>/dev/null || echo "")
            echo "host=${HOST}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Helm chart
        run: |
          helm upgrade --install ai-architect helm/ai-architect/ \
            --namespace ai-architect \
            --create-namespace \
            --timeout 5m \
            --set api.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/api \
            --set api.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set agent.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/agent \
            --set agent.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set ui.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/ui \
            --set ui.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set axiomApi.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/axiom-api \
            --set axiomApi.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set specweaverApi.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/specweaver-api \
            --set specweaverApi.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set specweaverAgent.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/specweaver-agent \
            --set specweaverAgent.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set lensApi.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/lens-api \
            --set lensApi.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set lensAgent.image.repository=${{ secrets.ACR_LOGIN_SERVER }}/lens-agent \
            --set lensAgent.image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set database.host=psql-axiom-dev-bpxn.postgres.database.azure.com \
            --set keyVault.vaultName=${{ secrets.KEY_VAULT_NAME }} \
            --set keyVault.tenantId=${{ secrets.KEY_VAULT_TENANT_ID }} \
            --set keyVault.userAssignedIdentityClientId=${{ secrets.AKS_KUBELET_CLIENT_ID }} \
            --set ingress.host=${{ steps.ingress.outputs.host }} \
            --set ingress.tls.enabled=true

      - name: Force TLS re-issuance if staging cert detected
        run: |
          DESIRED_ISSUER="letsencrypt-prod"
          echo "Desired issuer: $DESIRED_ISSUER"

          kubectl annotate ingress ai-architect-ingress \
            --namespace ai-architect \
            --overwrite \
            "cert-manager.io/cluster-issuer=${DESIRED_ISSUER}"
          echo "Ingress annotation set to ${DESIRED_ISSUER}"

          CERT_ISSUER=$(kubectl get secret ai-architect-tls \
            --namespace ai-architect \
            --output jsonpath='{.data.tls\.crt}' 2>/dev/null \
            | base64 -d \
            | openssl x509 -noout -issuer 2>/dev/null \
            || echo "")

          echo "Current cert issuer: $CERT_ISSUER"

          if echo "$CERT_ISSUER" | grep -qi "staging"; then
            echo "Staging cert detected — deleting certificate and secret to trigger prod re-issuance"
            kubectl delete certificate ai-architect-tls \
              --namespace ai-architect --ignore-not-found
            kubectl delete secret ai-architect-tls \
              --namespace ai-architect --ignore-not-found
            echo "Deleted. cert-manager will re-issue using ${DESIRED_ISSUER}."
          else
            echo "Cert issuer is already production — no re-issuance needed."
          fi

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/ai-architect-api \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/ai-architect-agent \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/ai-architect-ui \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/axiom-api \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/specweaver-api \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/specweaver-agent \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/lens-api \
            --namespace ai-architect --timeout=5m
          kubectl rollout status deployment/lens-agent \
            --namespace ai-architect --timeout=5m

      - name: Verify certificate issuance
        continue-on-error: true
        run: |
          echo "Waiting for TLS certificate to be issued..."
          echo "This can take 1-2 minutes on first deploy."
          for i in $(seq 1 18); do
            READY=$(kubectl get certificate ai-architect-tls \
              --namespace ai-architect \
              --output jsonpath='{.status.conditions[?(@.type=="Ready")].status}' \
              2>/dev/null || echo "False")
            if [ "$READY" = "True" ]; then
              echo "Certificate is READY"
              echo "Application available at: https://${{ steps.ingress.outputs.host }}"
              exit 0
            fi
            echo "Attempt ${i}/18 — waiting 10s..."
            sleep 10
          done
          echo "Certificate not ready after 3 minutes."
          echo "Check status with:"
          echo "  kubectl describe certificate ai-architect-tls -n ai-architect"
          echo "Note: continue-on-error is set — deploy is not failed."

      - name: Print status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ai-architect
          echo "=== Ingress ==="
          kubectl get ingress -n ai-architect

      - name: Debug failed pods
        if: failure()
        run: |
          set +e
          kubectl get pods -n ai-architect -o wide

          for pod in $(kubectl get pods -n ai-architect -o name); do
            echo "=== Describe $pod ==="
            kubectl describe $pod -n ai-architect | tail -200 || true

            echo "=== Logs for $pod (best effort) ==="
            kubectl logs $pod -n ai-architect --all-containers=true --tail=200 || true
          done

          echo "=== Namespace events ==="
          kubectl get events -n ai-architect --sort-by=.lastTimestamp | tail -200 || true
