spring:
  application:
    name: archon-api
  cache:
    type: caffeine
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/archon}
    username: ${DB_USER:archon}
    password: ${DB_PASSWORD:localdev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
            required: ${SMTP_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

email:
  from-address: ${EMAIL_FROM_ADDRESS:noreply@aiarchitect.local}
  from-name: ${EMAIL_FROM_NAME:Archon}
  base-url: ${APP_BASE_URL:http://localhost:3000}

agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8001}
  internal-secret: ${AGENT_INTERNAL_SECRET:dev-secret-change-in-prod}
  connect-timeout-seconds: ${AGENT_CONNECT_TIMEOUT:10}
  read-timeout-seconds: ${AGENT_READ_TIMEOUT:360}
  timeout-seconds: ${AGENT_READ_TIMEOUT:360}
  llm-provider: ${LLM_PROVIDER:ollama}

management:
  health:
    mail:
      # Disable the SMTP connectivity health check. The MailHealthIndicator tries to
      # open a TCP connection to SMTP_HOST at every health probe interval; when no
      # SMTP server is reachable (e.g. in dev/AKS without a sidecar), it returns DOWN
      # and drives the entire /actuator/health response to 503, crashing the pod.
      # Email sending itself is validated at runtime, not at startup.
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [traceId=%X{traceId:-} spanId=%X{spanId:-} conversationId=%X{conversationId:-}] - %msg%n"

server:
  port: 8080
  shutdown: graceful

security:
  jwt:
    secret: ${JWT_SECRET:super-secret-dev-key-change-in-prod-must-be-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
