server:
  port: ${SPECWEAVER_API_PORT:8082}
  shutdown: graceful

spring:
  application:
    name: specweaver-api
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/specweaver}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:localdev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

specweaver:
  storage:
    type: ${STORAGE_TYPE:minio}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:specweaver-documents}
    azure-blob:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
      container: ${AZURE_BLOB_CONTAINER:specweaver-documents}

agent:
  base-url: ${SPECWEAVER_AGENT_BASE_URL:http://specweaver-agent:8085}
  timeout-seconds: ${AGENT_TIMEOUT_SECONDS:300}

axiom:
  gateway:
    bypass: ${AXIOM_GATEWAY_BYPASS:false}
    internal-secret: ${AXIOM_INTERNAL_SECRET:}

security:
  jwt:
    secret: ${JWT_SECRET:super-secret-dev-key-change-in-prod-must-be-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

logging:
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [traceId=%X{traceId:-} spanId=%X{spanId:-} sessionId=%X{sessionId:-}] - %msg%n"
