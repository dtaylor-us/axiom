server:
  port: ${AXIOM_API_PORT:8080}

spring:
  application:
    name: axiom-api
  cloud:
    gateway:
      routes:
        - id: archon
          uri: ${ARCHON_API_BASE_URL:http://archon-api:8081}
          predicates:
            - Path=/api/v1/archon/**
          filters:
            - StripPrefix=3
            - AddRequestHeader=X-Axiom-Pillar, archon
            - AddRequestHeader=X-Axiom-Gateway-Version, 1

      default-filters:
        - name: UserContextForwarding

axiom:
  platform:
    name: Axiom
    version: 1.0.0
  pillars:
    archon:
      base-url: ${ARCHON_API_BASE_URL:http://archon-api:8081}
      enabled: true
      health-path: /actuator/health
    specweaver:
      base-url: ${SPECWEAVER_API_BASE_URL:http://specweaver-api:8082}
      enabled: false
    scout:
      base-url: ${SCOUT_API_BASE_URL:http://scout-api:8083}
      enabled: false
    forge:
      base-url: ${FORGE_API_BASE_URL:http://forge-api:8084}
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    show-details: always
