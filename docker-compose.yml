services:
  postgres:
    image: postgres:16-alpine
    container_name: archon-postgres
    environment:
      POSTGRES_DB: archon
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aiarchitect-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: aiarchitect-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: aiarchitect-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo 'Pulling primary model: ${OLLAMA_PRIMARY_MODEL:-qwen3:14b}' &&
        ollama pull ${OLLAMA_PRIMARY_MODEL:-qwen3:14b} &&
        echo 'Pulling fast model: ${OLLAMA_FAST_MODEL:-qwen3:8b}' &&
        ollama pull ${OLLAMA_FAST_MODEL:-qwen3:8b} &&
        echo 'Model pull complete'
      "
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: archon-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aiarchitect-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ./ai-architect-agent
      dockerfile: Dockerfile
    container_name: archon-agent
    environment:
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret-change-in-prod}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_HARDWARE_TIER: ${OLLAMA_HARDWARE_TIER:-2}
      OLLAMA_PRIMARY_MODEL: ${OLLAMA_PRIMARY_MODEL:-qwen3:14b}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-qwen3:8b}
      OLLAMA_NUM_CTX_PRIMARY: ${OLLAMA_NUM_CTX_PRIMARY:-16384}
      OLLAMA_NUM_CTX_FAST: ${OLLAMA_NUM_CTX_FAST:-8192}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_SERVICE_NAME: ai-architect-agent
      OTEL_TRACES_SAMPLER: always_on
    ports: ["8001:8001"]
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./ai-architect-api
      dockerfile: Dockerfile
    container_name: archon-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/archon
      DB_USER: archon
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      AGENT_BASE_URL: http://agent:8001
      AGENT_READ_TIMEOUT: ${AGENT_READ_TIMEOUT:-360}
      AGENT_INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret-change-in-prod}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-chars-here}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@aiarchitect.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Archon}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: ai-architect-api
      MANAGEMENT_TRACING_ENABLED: "true"
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  ui:
    build:
      context: ./ai-architect-ui
      dockerfile: Dockerfile
    container_name: archon-ui
    ports: ["3000:80"]
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: archon-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_started
      agent:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: archon-grafana
    ports: ["3001:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/archon.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  ollama_models:
    name: aiarchitect-ollama-models
  prometheus_data:
  grafana_data:
