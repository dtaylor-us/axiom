services:
  # Local DB setup: CREATE DATABASE memoria; (run once after postgres starts)
  postgres:
    image: postgres:16-alpine
    container_name: archon-postgres
    environment:
      POSTGRES_DB: archon
      POSTGRES_USER: archon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archon"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aiarchitect-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: archon-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: axiom-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aiarchitect-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Archon pillar ─────────────────────────────────────────────────────────
  # Always starts. No profile required.
  # AXIOM_GATEWAY_BYPASS=true in local mode so the UI can hit archon-api
  # directly without requiring axiom-api to be running.

  agent:
    build:
      context: ./archon-agent
      dockerfile: Dockerfile
    container_name: archon-agent
    environment:
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret-change-in-prod}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HARDWARE_TIER: ${OLLAMA_HARDWARE_TIER:-2}
      OLLAMA_PRIMARY_MODEL: ${OLLAMA_PRIMARY_MODEL:-qwen3:14b}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-qwen3:8b}
      OLLAMA_NUM_CTX_PRIMARY: ${OLLAMA_NUM_CTX_PRIMARY:-16384}
      OLLAMA_NUM_CTX_FAST: ${OLLAMA_NUM_CTX_FAST:-8192}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: ${ARCHON_AGENT_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OTEL_SERVICE_NAME: archon-agent
      OTEL_TRACES_SAMPLER: always_on
    ports: ["8001:8001"]
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./archon-api
      dockerfile: Dockerfile
    container_name: archon-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/archon
      DB_USER: archon
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      AGENT_BASE_URL: http://agent:8001
      AGENT_READ_TIMEOUT: ${AGENT_READ_TIMEOUT:-360}
      AGENT_INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret-change-in-prod}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-chars-here}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@aiarchitect.local}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Archon}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: local
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OTEL_SERVICE_NAME: archon-api
      MANAGEMENT_TRACING_ENABLED: "true"
      # Gateway bypass: true in local dev so the UI hits archon-api directly.
      # Set to false only when running with axiom-api (--profile platform).
      AXIOM_GATEWAY_BYPASS: "true"
    ports: ["8081:8081"]
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ui:
    build:
      context: ./axiom-ui
      dockerfile: Dockerfile
    container_name: archon-ui
    ports: ["3000:80"]
    depends_on:
      api:
        condition: service_started

  # ── SpecWeaver pillar ─────────────────────────────────────────────────────
  # Profile: specweaver
  # Start with: docker compose --profile specweaver up

  specweaver-api:
    build:
      context: ./specweaver-api
      dockerfile: Dockerfile
    container_name: specweaver-api
    profiles:
      - specweaver
      - platform
    ports:
      - "8082:8082"
    environment:
      - SPECWEAVER_API_PORT=8082
      - SPRING_PROFILES_ACTIVE=local
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/specweaver
      - POSTGRES_USERNAME=archon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localdev}
      - JWT_SECRET=${SPECWEAVER_JWT_SECRET:-dev-jwt-secret-minimum-32-chars-here}
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=specweaver-documents
      - AXIOM_GATEWAY_BYPASS=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - default
    restart: unless-stopped

  specweaver-agent:
    build:
      context: ./specweaver-agent
      dockerfile: Dockerfile
    container_name: specweaver-agent
    profiles:
      - specweaver
      - platform
    ports:
      - "8085:8085"
    environment:
      - SPECWEAVER_AGENT_PORT=8085
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=specweaver-documents
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_PRIMARY_MODEL=${OLLAMA_PRIMARY_MODEL:-qwen3:14b}
      - OLLAMA_FAST_MODEL=${OLLAMA_FAST_MODEL:-qwen3:8b}
      - OLLAMA_NUM_CTX_PRIMARY=${OLLAMA_NUM_CTX_PRIMARY:-16384}
      - OLLAMA_NUM_CTX_FAST=${OLLAMA_NUM_CTX_FAST:-8192}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${SPECWEAVER_AGENT_OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      specweaver-api:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - default
    restart: unless-stopped

  # ── Lens pillar ───────────────────────────────────────────────────────────
  # Profile: lens, platform
  # Start with: docker compose --profile lens up

  lens-agent:
    build:
      context: ./lens-agent
      dockerfile: Dockerfile
    container_name: lens-agent
    profiles:
      - lens
      - platform
    ports:
      - "8086:8086"
    environment:
      - LENS_AGENT_PORT=8086
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${LENS_AGENT_OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-false}
      - OTEL_SERVICE_NAME=lens-agent
      - OTEL_TRACES_SAMPLER=always_on
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8086/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - default
    restart: unless-stopped

  lens-api:
    build:
      context: ./lens-api
      dockerfile: Dockerfile
    container_name: lens-api
    profiles:
      - lens
      - platform
    ports:
      - "8083:8083"
    environment:
      - LENS_API_PORT=8083
      - SPRING_PROFILES_ACTIVE=local
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/lens
      - POSTGRES_USERNAME=archon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localdev}
      - LENS_AGENT_BASE_URL=http://lens-agent:8086
      # Gateway bypass: true in standalone lens mode (no axiom-api).
      # Set AXIOM_GATEWAY_BYPASS=false when running --profile platform.
      - AXIOM_GATEWAY_BYPASS=${AXIOM_GATEWAY_BYPASS:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-false}
      - OTEL_SERVICE_NAME=lens-api
    depends_on:
      postgres:
        condition: service_healthy
      lens-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - default
    restart: unless-stopped

  memoria-agent:
    build:
      context: ./memoria-agent
      dockerfile: Dockerfile
    container_name: memoria-agent
    profiles:
      - memoria
      - platform
    ports:
      - "8087:8087"
    environment:
      - MEMORIA_AGENT_PORT=8087
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - INTERNAL_SECRET=${INTERNAL_SECRET:-dev-secret-change-in-prod}
      - OTEL_SDK_DISABLED=true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8087/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default

  memoria-api:
    build:
      context: ./memoria-api
      dockerfile: Dockerfile
    container_name: memoria-api
    profiles:
      - memoria
      - platform
    ports:
      - "8084:8084"
    environment:
      - MEMORIA_API_PORT=8084
      - SPRING_PROFILES_ACTIVE=local
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/memoria
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localdev}
      - MEMORIA_AGENT_BASE_URL=http://memoria-agent:8087
      - AXIOM_GATEWAY_BYPASS=true
      - AXIOM_INTERNAL_SECRET=${INTERNAL_SECRET:-dev-secret-change-in-prod}
      - OTEL_SDK_DISABLED=true
      - MANAGEMENT_TRACING_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      memoria-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - default

  # ── Platform gateway ──────────────────────────────────────────────────────
  # Profile: platform
  # Requires all three pillars. Starts with:
  #   docker compose --profile platform up
  # axiom-api routes /api/v1/archon/**, /api/v1/specweaver/**,
  # /api/v1/lens/**, and /api/v1/auth/** through the gateway.
  # Set AXIOM_GATEWAY_BYPASS=false for all pillar services when
  # running under the platform profile.

  axiom-api:
    build:
      context: ./axiom-api
      dockerfile: Dockerfile
    container_name: axiom-api
    profiles:
      - platform
    ports:
      - "8080:8080"
    environment:
      - AXIOM_API_PORT=8080
      - ARCHON_API_BASE_URL=http://api:8081
      - SPECWEAVER_API_BASE_URL=http://specweaver-api:8082
      - LENS_API_BASE_URL=http://lens-api:8083
      - MEMORIA_API_BASE_URL=http://memoria-api:8084
      - AXIOM_GATEWAY_BYPASS=false
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-minimum-32-chars-here}
      - AXIOM_INTERNAL_SECRET=${AXIOM_INTERNAL_SECRET:-dev-secret-change-in-prod}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      api:
        condition: service_healthy
      specweaver-api:
        condition: service_healthy
      lens-api:
        condition: service_healthy
      memoria-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - default
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: archon-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    depends_on:
      api:
        condition: service_started
      agent:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: archon-grafana
    ports: ["3001:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/archon.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  qdrant_data:
  minio-data:
    name: axiom-minio-data
  prometheus_data:
  grafana_data:
